<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f2027">
  <link rel="manifest" href="manifest.json">
  <title>Qaaraanka Portal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
    .view-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    #login-wrapper { justify-content: center; } 
    #dashboard-wrapper { justify-content: flex-start; padding-top: 40px; }
    .panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 30px 20px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); }
    .panel.dashboard { max-width: 800px; }
    h2 { text-align: center; margin-bottom: 24px; font-weight: 700; }
    input, select, button { width: 100%; padding: 14px 16px; margin-bottom: 16px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.2); color: #fff; font-size: 16px; outline: none; }
    input:focus, select:focus { border-color: #4facfe; background: rgba(0, 0, 0, 0.4); }
    select option { background: #203a43; color: #fff; }
    button { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #000; font-weight: 700; border: none; cursor: pointer; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 24px; }
    @media (min-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 16px; border-radius: 12px; text-align: center; font-weight: 600; }
    .paid { background: rgba(46, 213, 115, 0.15); border-color: rgba(46, 213, 115, 0.4); color: #2ed573; }
    .pending { background: rgba(255, 71, 87, 0.15); border-color: rgba(255, 71, 87, 0.4); color: #ff4757; }
    .link { display: block; text-align: center; color: #aaa; text-decoration: none; font-size: 14px; margin-top: 10px; }
    .hidden { display: none !important; }
    .brand-footer { text-align: center; padding: 20px; font-size: 12px; color: rgba(255, 255, 255, 0.5); letter-spacing: 0.5px; }
  </style>
</head>
<body>

  <div class="view-wrapper" id="login-wrapper">
    <div class="panel">
      <h2>Qaaraanka Portal</h2>
      <input type="text" id="username" placeholder="Username (e.g. yuusuf)">
      <input type="password" id="password" placeholder="Password (Optional)">
      <button id="login-btn">Log In</button>
      <a href="admin.html" class="link">Admin Access &rarr;</a>
    </div>
  </div>

  <div class="view-wrapper hidden" id="dashboard-wrapper">
    <div class="panel dashboard">
      <h2>Hi, <span id="user-name"></span>!</h2>
      <select id="year-filter">
        <option value="2026">Year: 2026</option>
        <option value="2025">Year: 2025</option>
      </select>
      <div class="grid" id="months-grid"></div>
      <button onclick="location.reload()" style="margin-top: 24px; background: rgba(255,255,255,0.1); color: white;">Log Out</button>
    </div>
  </div>

  <div class="brand-footer">
    Qarashgareeyey Al Siraaj School | Sameeyey <a href="https://EngKhalidAA.github.io" target="_blank" style="color: #4facfe; text-decoration: none; font-weight: bold;">Eng. Khalid Ahmed A.</a>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient('https://wqrpmyxrtetltmgayglb.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxcnBteXhydGV0bHRtZ2F5Z2xiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NTgyMDQsImV4cCI6MjA5NjQzNDIwNH0.8nxgyk7saMiRzECIgBvxh4Gn84KPq0oji90nEg6gMDc');
    let currentUser = null;

    // Service Worker Registration for PWA
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    document.getElementById('login-btn').addEventListener('click', async () => {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      const btn = document.getElementById('login-btn');
      
      if (!user) return alert("Please enter a username");
      btn.innerText = "Loading...";

      const { data, error } = await supabase.from('members').select('id, full_name, password').eq('username', user).single();

      if (error || !data || (data.password && data.password !== pass)) {
        alert("Incorrect Username or Password!");
        btn.innerText = "Log In";
        return;
      }

      currentUser = data;
      document.getElementById('login-wrapper').classList.add('hidden');
      document.getElementById('dashboard-wrapper').classList.remove('hidden');
      document.getElementById('user-name').innerText = data.full_name;
      loadData(data.id, document.getElementById('year-filter').value);
    });

    document.getElementById('year-filter').addEventListener('change', (e) => {
      if(currentUser) loadData(currentUser.id, e.target.value);
    });

    async function loadData(memberId, year) {
      const { data: contributions } = await supabase.from('contributions').select('month').eq('member_id', memberId).eq('year', year);
      const paidMonths = contributions ? contributions.map(c => c.month) : [];
      const grid = document.getElementById('months-grid');
      grid.innerHTML = '';
      
      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      months.forEach((name, idx) => {
        const isPaid = paidMonths.includes(idx + 1);
        grid.innerHTML += `<div class="card ${isPaid ? 'paid' : 'pending'}">${name}<br><small>${isPaid ? 'Paid' : 'Pending'}</small></div>`;
      });
    }
  </script>
</body>
</html>
